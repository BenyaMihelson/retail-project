spring.application.name=retail-core-app

# 1. URL бази даних:
# На AWS підтягнеться SPRING_DATASOURCE_URL з компоузу (де хост — це "postgres").
# Локально в IDE підставиться дефолт — localhost:5432/retail_db.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/retail_db}

# 2. Логін користувача:
# На AWS візьметься з оточення, локально — ваш дефолтний retail_admin.
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:retail_admin}

# 3. Пароль:
# Сюди замість "твій_пароль" впиши той самий дефолтний пароль, який ти зазвичай використовуєш локально
# або який у тебе прописаний у файлі .env для змінної DB_PASSWORD.
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:retail_secure_password}

# Налаштування JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Вмикаємо Virtual Threads (фішка Java 21)
spring.threads.virtual.enabled=${SPRING_THREADS_VIRTUAL_ENABLED:true}