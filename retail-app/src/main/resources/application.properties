spring.application.name=retail-core-app

# БД конфігурується через змінні оточення в docker-compose
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Вмикаємо Virtual Threads (фішка Java 21, яка у Spring Boot працює "з коробки")
spring.threads.virtual.enabled=${SPRING_THREADS_VIRTUAL_ENABLED:true}